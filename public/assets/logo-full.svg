<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" role="img" aria-label="State General Contractors Inc">
  <defs>
    <linearGradient id="wndGradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8aa9c4"/>
      <stop offset="100%" stop-color="#3a4e64"/>
    </linearGradient>
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4e64"/>
      <stop offset="48%" stop-color="#2c3a5c"/>
      <stop offset="52%" stop-color="#22304f"/>
      <stop offset="100%" stop-color="#1a253d"/>
    </linearGradient>
  </defs>

  <!-- Icon (same as logo-icon.svg, positioned at x=0..96) -->
  <g>
    <polygon points="50,3 4,38 14,46 50,17 86,46 96,38" fill="#2c3a5c"/>
    <polygon points="14,46 14,108 26,108 26,46" fill="#2c3a5c"/>
    <polygon points="56,46 56,86 70,86 70,108 86,108 86,46" fill="#2c3a5c"/>
    <polygon points="14,98 86,98 86,108 14,108" fill="#2c3a5c"/>
    <polygon points="26,46 56,46 56,86 26,86" fill="url(#wndGradFull)"/>
    <line x1="41" y1="46" x2="41" y2="86" stroke="#2c3a5c" stroke-width="2"/>
  </g>

  <!-- "state" wordmark -->
  <text x="120" y="78" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="78" fill="url(#stateGrad)" letter-spacing="-3">state</text>

  <!-- "GENERAL CONTRACTORS INC" tagline -->
  <text x="124" y="100" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" fill="#7e92a8" letter-spacing="5">GENERAL CONTRACTORS INC</text>
</svg>
